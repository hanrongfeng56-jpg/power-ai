<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>电力工地 AI 助手</title>
<style>
  /* ---------- 保留你原有 CSS ---------- */
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f0f2f5; min-height: 100vh; display: flex; justify-content: center; padding: 16px; }
  .container { width: 100%; max-width: 420px; }
  .topbar { background: #fff; border-radius: 12px; padding: 14px 16px; margin-bottom: 12px; display: flex; align-items: center; gap: 10px; border: 1px solid #e8e8e8; }
  .topbar-icon { width: 36px; height: 36px; border-radius: 8px; background: #e6f1fb; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
  .topbar-title { font-size: 15px; font-weight: 600; color: #1a1a1a; }
  .topbar-sub { font-size: 12px; color: #888; margin-top: 2px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #1D9E75; margin-left: auto; flex-shrink: 0; }
  .card { background: #fff; border-radius: 12px; padding: 14px 16px; margin-bottom: 12px; border: 1px solid #e8e8e8; }
  .label { font-size: 12px; color: #888; margin-bottom: 8px; }
  .key-row { display: flex; gap: 8px; }
  .key-row input { flex: 1; padding: 8px 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 13px; color: #1a1a1a; background: #fafafa; }
  .key-row input:focus { outline: none; border-color: #378ADD; }
  .btn-save { padding: 8px 14px; background: #e6f1fb; color: #185FA5; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; white-space: nowrap; }
  .btn-save:hover { background: #b5d4f4; }
  .upload-zone { border: 2px dashed #ccc; border-radius: 12px; padding: 28px 16px; text-align: center; cursor: pointer; background: #fafafa; transition: all 0.2s; }
  .upload-zone:hover { border-color: #378ADD; background: #f0f6ff; }
  .upload-icon { font-size: 32px; margin-bottom: 8px; }
  .upload-text { font-size: 13px; color: #888; line-height: 1.6; }
  .btn-upload { display: inline-block; margin-top: 10px; padding: 8px 18px; background: #e6f1fb; color: #185FA5; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; }
  .preview-wrap { border-radius: 10px; overflow: hidden; border: 1px solid #e8e8e8; margin-bottom: 12px; }
  .preview-img { width: 100%; max-height: 200px; object-fit: cover; display: block; }
  .preview-bar { display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; background: #fafafa; }
  .preview-name { font-size: 12px; color: #888; }
  .btn-remove { font-size: 12px; color: #e24b4a; background: none; border: none; cursor: pointer; }
  textarea { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 13px; color: #1a1a1a; background: #fafafa; resize: none; font-family: inherit; line-height: 1.5; }
  textarea:focus { outline: none; border-color: #378ADD; }
  textarea::placeholder { color: #bbb; }
  .btn-analyze { width: 100%; padding: 13px; background: #185FA5; border: none; border-radius: 10px; color: #fff; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 4px; letter-spacing: 1px; }
  .btn-analyze:hover { background: #0C447C; }
  .btn-analyze:disabled { background: #ccc; cursor: not-allowed; }
  .result-wrap { background: #fff; border-radius: 12px; border: 1px solid #e8e8e8; overflow: hidden; margin-top: 12px; }
  .result-head { padding: 12px 16px; background: #e6f1fb; border-bottom: 1px solid #b5d4f4; display: flex; align-items: center; gap: 8px; }
  .result-head-text { font-size: 14px; font-weight: 600; color: #0C447C; }
  .result-body { padding: 14px 16px; }
  .risk-item { display: flex; gap: 10px; padding: 10px 0; border-bottom: 1px solid #f0f0f0; }
  .risk-item:last-child { border-bottom: none; }
  .risk-badge { flex-shrink: 0; font-size: 11px; padding: 3px 8px; border-radius: 6px; font-weight: 600; height: fit-content; white-space: nowrap; }
  .badge-high { background: #FCEBEB; color: #791F1F; }
  .badge-mid { background: #FAEEDA; color: #633806; }
  .badge-ok { background: #EAF3DE; color: #27500A; }
  .risk-text { font-size: 13px; color: #1a1a1a; line-height: 1.6; }
  .risk-ref { font-size: 11px; color: #888; margin-top: 3px; }
  .divider { height: 1px; background: #f0f0f0; margin: 12px 0; }
  .suggest-title { font-size: 13px; font-weight: 600; color: #1a1a1a; margin-bottom: 8px; }
  .suggest-item { font-size: 13px; color: #555; line-height: 1.7; padding-left: 12px; position: relative; }
  .suggest-item::before { content: "·"; position: absolute; left: 0; color: #378ADD; font-weight: bold; }
  .loading-wrap { text-align: center; padding: 28px; }
  .loading-dots { display: inline-flex; gap: 6px; }
  .loading-dot { width: 8px; height: 8px; border-radius: 50%; background: #378ADD; animation: blink 1.2s infinite; }
  .loading-dot:nth-child(2) { animation-delay: .2s; }
  .loading-dot:nth-child(3) { animation-delay: .4s; }
  @keyframes blink { 0%,80%,100%{opacity:.2} 40%{opacity:1} }
  .loading-text { font-size: 13px; color: #888; margin-top: 10px; }
  .error-msg { background: #FCEBEB; color: #791F1F; padding: 12px; border-radius: 8px; font-size: 13px; line-height: 1.6; margin-top: 12px; }
  .success-key { border-color: #1D9E75 !important; }
  .notice { font-size: 11px; color: #aaa; text-align: center; margin-top: 8px; line-height: 1.5; }
</style>
</
